program: run_clm.py
method: bayes
run_cap: 20
metric:
  name: best_eval_loss
  goal: minimize

parameters:
  # Model
  model_name_or_path:
    value: gpt2-large
  train_file:
    value: train_strings.txt
  validation_file:
    value: val_strings.txt

  # Optimization
  learning_rate:
    distribution: log_uniform_values
    min: 5e-6
    max: 5e-5
  weight_decay:
    value: 0.01
  warmup_ratio:
    distribution: uniform
    min: 0.01
    max: 0.05
  lr_scheduler_type:
    values: [cosine, linear]
  adam_beta1:
    value: 0.9
  adam_beta2:
    values: [0.95, 0.98]
  adam_epsilon:
    value: 1e-8
  max_grad_norm:
    value: 1.0

  # Batch — tuned for 1723 training blocks
  # effective batch = per_device * grad_accum; targeting 32-64 for ~80-160 steps over 3 epochs
  per_device_train_batch_size:
    values: [4, 8]
  per_device_eval_batch_size:
    value: 4
  gradient_accumulation_steps:
    values: [2, 4, 8]

  # Data
  block_size:
    value: 1024
  preprocessing_num_workers:
    value: 8

  # Training duration
  num_train_epochs:
    value: 3

  # Eval & checkpointing — scaled to expected ~80-160 optimizer steps per run
  eval_strategy:
    value: steps
  eval_steps:
    value: 20
  logging_steps:
    value: 5

  # Optimizer
  optim:
    value: adamw_torch_fused

  # Reproducibility
  seed:
    values: [42, 1337]

early_terminate:
  type: hyperband
  min_iter: 20
  eta: 3

# Boolean flags passed explicitly to avoid HF argparse misinterpreting --flag=true
command:
  - ${env}
  - python
  - ${program}
  - ${args_no_boolean_flags}
  - --output_dir=gpt2-sweep
  - --do_train
  - --do_eval
  - --fp16
  - --gradient_checkpointing
  - --overwrite_output_dir
  - --report_to=wandb
  - --save_strategy=no